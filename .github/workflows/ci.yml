name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'web/**'
      - '*.md'
  pull_request:
    branches: [ main, develop, 'release/**' ]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Only run if Salesforce secrets are configured
    if: ${{ vars.SF_CONFIGURED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate (JWT)
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
        run: |
          echo "$SF_JWT_KEY" > server.key
          sf org login jwt \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --instance-url "${SF_INSTANCE_URL:-https://login.salesforce.com}" \
            --alias SmartMenuCI \
            --set-default

      - name: Validate Deployment (Check-Only)
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org SmartMenuCI \
            --dry-run \
            --wait 30

      - name: Run Apex Tests
        run: |
          sf apex test run \
            --target-org SmartMenuCI \
            --result-format human \
            --code-coverage \
            --wait 15

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.SF_CONFIGURED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate (JWT)
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
        run: |
          echo "$SF_JWT_KEY" > server.key
          sf org login jwt \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --instance-url "${SF_INSTANCE_URL:-https://login.salesforce.com}" \
            --alias SmartMenuCI \
            --set-default

      - name: Deploy to Org
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org SmartMenuCI \
            --wait 30

      - name: Run Post-Deploy Validation Tests
        run: |
          sf apex test run \
            --target-org SmartMenuCI \
            --result-format human \
            --code-coverage \
            --wait 15
